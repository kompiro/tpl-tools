name: Bug report
description: Report a problem with @kompiro/tpl-tools
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the command you ran.
      placeholder: Running `tpl validate` fails with ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include a minimal TPL file and reference data if relevant.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npx tpl --version` or the version in your lockfile.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version and OS.
      placeholder: "Node 20.11.0, macOS 14"
    validations:
      required: true
